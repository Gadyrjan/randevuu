<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX Surat Merkezi</title>
    <style>
        /* Öňki dizaýnyňyzyň hemme kody şu ýerde kalsyn */
        body { font-family: sans-serif; background: #000; color: white; padding: 20px; text-align: center; }
        .glass-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: none; }
        .submit-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border-radius: 15px; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>MAX SURAT</h1>
        <p>Iş wagtymyz: 08:00 - 23:00</p>
        <form id="orderForm">
            <input type="text" id="name" placeholder="Adyňyz" required>
            <input type="tel" id="phone" placeholder="Telefonuňyz" required>
            <input type="datetime-local" id="date" required>
            <div style="text-align:left; margin: 10px;">
                <input type="checkbox" id="s1" value="Surat"> <label for="s1">📷 Surat</label><br>
                <input type="checkbox" id="s2" value="Kopya"> <label for="s2">🖨️ Kopya</label>
            </div>
            <button type="submit" class="submit-btn" id="subBtn">TASSYKLA</button>
        </form>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "ŞU ÝERE_GOOGLE_APPS_SCRIPT_URL_ADRESINI_GOÝUŇ";

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            btn.innerText = "Ugradylýar...";
            btn.disabled = true;

            const svcs = [];
            if(document.getElementById('s1').checked) svcs.push("Surat");
            if(document.getElementById('s2').checked) svcs.push("Kopya");

            const data = {
                musteri: document.getElementById('name').value,
                telefon: document.getElementById('phone').value,
                tarih: document.getElementById('date').value,
                hyzmatlar: svcs.join(", ")
            };

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Türkmenistanda has gowy işlemek üçin
                body: JSON.stringify(data)
            }).then(() => {
                alert("Randewuňyz kabul edildi!");
                this.reset();
                btn.innerText = "TASSYKLA";
                btn.disabled = false;
            }).catch(err => {
                alert("Säwlik ýüze çykdy.");
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
