<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX Surat Merkezi</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; 
            background: #000; 
            color: white; 
            min-height: 100vh; 
            display: flex;
            justify-content: center;
        }

        /* iOS Ultra Modern Background */
        .bg-gradient {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 15% 15%, #1e1b4b 0%, transparent 40%),
                        radial-gradient(circle at 85% 85%, #312e81 0%, transparent 40%),
                        linear-gradient(180deg, #020617 0%, #000000 100%);
            z-index: -1;
        }

        .container { width: 100%; max-width: 430px; padding: 20px; position: relative; }

        /* Dil Seçiji */
        .lang-bar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px; }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 6px 12px; border-radius: 10px; font-size: 12px; cursor: pointer; backdrop-filter: blur(10px); }

        /* Klas Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .logo-area { text-align: center; margin-bottom: 25px; }
        .logo-circle { width: 70px; height: 70px; background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 24px; font-weight: 900; box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); }
        h1 { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .work-time { font-size: 13px; color: #fbbf24; margin-top: 8px; font-weight: 600; opacity: 0.9; }

        /* Form Style */
        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; margin-left: 5px; font-weight: 500; }
        input { 
            width: 100%; padding: 16px; border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(255,255,255,0.05); 
            color: white; font-size: 16px; transition: 0.3s;
        }
        input:focus { outline: none; border-color: #6366f1; background: rgba(255,255,255,0.08); }

        /* Service Cards */
        .svc-box {
            display: flex; align-items: center; gap: 15px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 15px; margin-bottom: 12px; cursor: pointer; transition: 0.3s;
        }
        .svc-box:has(input:checked) { border-color: #6366f1; background: rgba(99, 102, 241, 0.1); }
        .svc-box input { width: 20px; height: 20px; }
        .svc-icon { font-size: 22px; }
        .svc-info b { display: block; font-size: 15px; }
        .svc-info span { font-size: 12px; color: #94a3b8; }

        .submit-btn {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white; font-weight: 700; font-size: 17px; cursor: pointer;
            margin-top: 10px; box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
        }

        /* Call Area */
        .call-section { margin-top: 30px; text-align: center; }
        .call-title { color: #fbbf24; font-size: 15px; font-weight: 700; margin-bottom: 5px; }
        .call-desc { font-size: 12px; color: #94a3b8; margin-bottom: 15px; }
        .call-hint { font-size: 10px; color: #4ade80; font-weight: 700; margin-bottom: 10px; }
        
        .contact-list { display: flex; flex-direction: column; gap: 8px; }
        .contact-item { 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.04); padding: 12px 18px; border-radius: 15px;
            text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.05);
        }
        .contact-item b { font-size: 14px; }
        .contact-item span { color: #4ade80; font-size: 13px; font-weight: 600; }

        /* Success Message */
        .success-pop {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="container">
        <div class="lang-bar">
            <button class="lang-btn" onclick="setLang('tk')">🇹🇲 TM</button>
            <button class="lang-btn" onclick="setLang('tr')">🇹🇷 TR</button>
            <button class="lang-btn" onclick="setLang('ru')">🇷🇺 RU</button>
            <button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
        </div>

        <div class="glass-card">
            <div class="logo-area">
                <div class="logo-circle">MAX</div>
                <h1 id="txt-title">Surat Merkezi</h1>
                <div class="work-time" id="txt-work">🕒 08:00 - 23:00 aralygy</div>
            </div>

            <form id="form">
                <div class="input-group">
                    <label id="lbl-name">Adyňyz we Familiýaňyz</label>
                    <input type="text" id="name" required placeholder="Ahmet Muhammedow">
                </div>

                <div class="input-group">
                    <label id="lbl-phone">Telefon belgiňiz</label>
                    <input type="tel" id="phone" required placeholder="+993 6x xxxxxx">
                </div>

                <div class="input-group">
                    <label id="lbl-date">Wagt saýlaň</label>
                    <input type="datetime-local" id="date" required>
                </div>

                <label style="margin-top: 10px;">Hyzmat saýlaň:</label>
                
                <label class="svc-box">
                    <input type="checkbox" name="svc" value="Surat">
                    <div class="svc-icon">📷</div>
                    <div class="svc-info">
                        <b id="svc-1">Surata düşmek</b>
                        <span id="prc-1">Bahasy: 10 TMT</span>
                    </div>
                </label>

                <label class="svc-box">
                    <input type="checkbox" name="svc" value="Kopya">
                    <div class="svc-icon">🖨️</div>
                    <div class="svc-info">
                        <b id="svc-2">Kopya etdirmek</b>
                        <span id="prc-2">2 TMT / 1 TMT</span>
                    </div>
                </label>

                <button type="submit" class="submit-btn" id="btn-submit">TASSYKLA</button>
            </form>
        </div>

        <div class="call-section">
            <div class="call-title" id="ntc-title">ÜNS BERIŇ!</div>
            <p class="call-desc" id="ntc-desc">Başga maglumat almak üçin aşakdaky belgilere jaň ediň:</p>
            <div class="call-hint" id="ntc-hint">JAŇ ETMEK ÜÇIN ÜSTÜNE BASYŇ</div>
            
            <div class="contact-list">
                <a href="tel:+99363517106" class="contact-item"><b>Maksat</b> <span>+993 63 517106</span></a>
                <a href="tel:+99361244811" class="contact-item"><b>Gadyr</b> <span>+993 61 244811</span></a>
                <a href="tel:+99363078751" class="contact-item"><b>Ýagşy</b> <span>+993 63 078751</span></a>
            </div>
        </div>
    </div>

    <div class="success-pop" id="pop">
        <div style="font-size: 60px;">✅</div>
        <h2 style="margin-top: 15px;">KABUL EDİLDİ</h2>
        <p style="color: #94a3b8; margin-top: 8px;">Size garaşýarys!</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzFwxW8nB155ILbdxuj5DREx2s_ltHme4",
            authDomain: "makga-8a13a.firebaseapp.com",
            databaseURL: "https://makga-8a13a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "makga-8a13a",
            storageBucket: "makga-8a13a.firebasestorage.app",
            messagingSenderId: "875840350708",
            appId: "1:875840350708:web:eeea3cffd993d2a3d2f1a1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const dict = {
            tk: { title:"Surat Merkezi", work:"🕒 08:00 - 23:00 aralygy", name:"Adyňyz we Familiýaňyz", phone:"Telefon belgiňiz", date:"Wagt saýlaň", s1:"Surata düşmek", p1:"Bahasy: 10 TMT", s2:"Kopya etdirmek", p2:"2 TMT / 1 TMT", btn:"TASSYKLA", nT:"ÜNS BERIŇ!", nD:"Başga maglumat almak üçin jaň ediň:", nH:"JAŇ ETMEK ÜÇIN ÜSTÜNE BASYŇ" },
            tr: { title:"Fotoğraf Merkezi", work:"🕒 08:00 - 23:00 arası", name:"Adınız ve Soyadınız", phone:"Telefon numaranız", date:"Zaman seçin", s1:"Fotoğraf çekimi", p1:"Ücret: 10 TMT", s2:"Fotokopi", p2:"2 TMT / 1 TMT", btn:"ONAYLA", nT:"DİKKAT!", nD:"Bilgi almak için arayın:", nH:"ARAMAK İÇİN ÜZERİNE TIKLAYIN" },
            ru: { title:"Фото Центр", work:"🕒 с 08:00 до 23:00", name:"Имя и Фамилия", phone:"Номер телефона", date:"Выберите время", s1:"Фотосъемка", p1:"Цена: 10 TMT", s2:"Копирование", p2:"2 TMT / 1 TMT", btn:"ПОДТВЕРДИТЬ", nT:"ВНИМАНИЕ!", nD:"Звоните для информации:", nH:"НАЖМИТЕ, ЧТОБЫ ПОЗВОНИТЬ" },
            en: { title:"Photo Center", work:"🕒 08:00 AM - 11:00 PM", name:"Full Name", phone:"Phone Number", date:"Select Time", s1:"Photography", p1:"Price: 10 TMT", s2:"Photocopying", p2:"2 TMT / 1 TMT", btn:"CONFIRM", nT:"NOTICE!", nD:"Call for information:", nH:"CLICK TO CALL" }
        };

        function setLang(l) {
            const d = dict[l];
            document.getElementById('txt-title').innerText = d.title;
            document.getElementById('txt-work').innerText = d.work;
            document.getElementById('lbl-name').innerText = d.name;
            document.getElementById('lbl-phone').innerText = d.phone;
            document.getElementById('lbl-date').innerText = d.date;
            document.getElementById('svc-1').innerText = d.s1;
            document.getElementById('prc-1').innerText = d.p1;
            document.getElementById('svc-2').innerText = d.s2;
            document.getElementById('prc-2').innerText = d.p2;
            document.getElementById('btn-submit').innerText = d.btn;
            document.getElementById('ntc-title').innerText = d.nT;
            document.getElementById('ntc-desc').innerText = d.nD;
            document.getElementById('ntc-hint').innerText = d.nH;
        }

        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const svcs = Array.from(document.querySelectorAll('input[name="svc"]:checked')).map(el => el.value);
            if(svcs.length === 0) { alert("Hyzmat saýlaň!"); return; }
            
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "...";

            db.ref("randevular").push({
                musteri: document.getElementById('name').value,
                telefon: document.getElementById('phone').value,
                tarih: document.getElementById('date').value,
                hyzmatlar: svcs.join(", "),
                vakit: Date.now()
            }).then(() => {
                document.getElementById('pop').style.display = 'flex';
                setTimeout(() => { location.reload(); }, 3000);
            });
        });
    </script>
</body>
</html>
