<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX Surat Merkezi</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .bg-blur { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.2), transparent 50%), radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.2), transparent 50%); filter: blur(80px); z-index: -1; }
        .menu-btn { position: fixed; top: 20px; left: 20px; z-index: 1001; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); width: 45px; height: 45px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; }
        .menu-btn span { width: 22px; height: 2px; background: white; border-radius: 2px; }
        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100vh; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(30px); border-right: 1px solid rgba(255,255,255,0.1); z-index: 1000; transition: 0.3s; padding: 80px 20px; }
        .sidebar.active { left: 0; }
        .sidebar-item { padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; }
        .container { max-width: 430px; margin: 0 auto; padding: 80px 20px 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(40px); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .logo { width: 80px; height: 80px; background: linear-gradient(135deg, #8b5cf6, #3b82f6); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 30px; font-weight: 900; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-size: 16px; }
        .service-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 18px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }
        .service-card input { width: 20px; height: 20px; margin-top: 5px; }
        .price-tag { color: #fbbf24; font-size: 13px; font-weight: bold; margin-top: 4px; }
        .submit-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #8b5cf6, #3b82f6); border: none; border-radius: 18px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="bg-blur"></div>
    <div class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('active')">
        <span></span><span></span><span></span>
    </div>
    <div class="sidebar" id="sidebar">
        <h3 style="margin-bottom: 20px; color: #8b5cf6;">Kategoriýalar</h3>
        <div class="sidebar-item">💾 Fleskalar</div>
        <div class="sidebar-item">🎧 Nausniklar</div>
        <div class="sidebar-item">🔌 Açkylar</div>
        <div class="sidebar-item">🔋 Usblar</div>
        <div class="sidebar-item">🔊 Kalonkalar</div>
        <div class="sidebar-item">📡 Pultlar</div>
        <div class="sidebar-item">📱 Telefon daşlary</div>
    </div>

    <div class="container">
        <div class="glass-card">
            <div class="logo">MAX</div>
            <h2 style="text-align: center; margin-bottom: 20px;">Surat Merkezi</h2>

            <form id="appointmentForm">
                <input type="text" id="name" placeholder="Adyňyz we Familiýaňyz" required>
                <!-- TELEFON ALANI EKLENDİ -->
                <input type="text" id="phone" placeholder="Telefon belgiňiz (+993...)" required>
                <input type="datetime-local" id="date" required>

                <div class="service-card">
                    <input type="checkbox" name="hizmet" value="Surat">
                    <div>
                        <div style="font-weight: 600;">📷 Surata düşmek</div>
                        <div class="price-tag">Bahasy: 10 TMT</div>
                    </div>
                </div>

                <div class="service-card">
                    <input type="checkbox" name="hizmet" value="Kopya">
                    <div>
                        <div style="font-weight: 600;">🖨️ Kopya etdirmek</div>
                        <div style="font-size: 12px; color: #94a3b8;">Pasport 2TMT, Beýlekiler 1TMT</div>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="btnText">TASSYKLA</button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzFwxW8nB155ILbdxuj5DREx2s_ltHme4",
            authDomain: "makga-8a13a.firebaseapp.com",
            databaseURL: "https://makga-8a13a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "makga-8a13a",
            storageBucket: "makga-8a13a.firebasestorage.app",
            messagingSenderId: "875840350708",
            appId: "1:875840350708:web:eeea3cffd993d2a3d2f1a1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        document.getElementById('appointmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnText');
            const svcs = Array.from(document.querySelectorAll('input[name="hizmet"]:checked')).map(el => el.value);
            
            if(svcs.length === 0) { alert("Hyzmat saýlaň!"); return; }
            
            btn.innerText = "UGRADYLYAR...";
            btn.disabled = true;

            db.ref("randevular").push({
                musteri: document.getElementById('name').value,
                telefon: document.getElementById('phone').value, // Telefon eklendi
                tarih: document.getElementById('date').value,
                hyzmatlar: svcs.join(", "),
                vakit: Date.now()
            }).then(() => {
                alert("Randevuňyz ugradyldy!");
                this.reset();
                btn.innerText = "TASSYKLA";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
