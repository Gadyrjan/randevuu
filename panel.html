<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX - Dolandyryş Paneli</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #000;
            --card-bg: rgba(28, 28, 30, 0.7);
            --accent: #5e5ce6;
            --green: #34c759;
            --red: #ff3b30;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }

        body { 
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* iOS 26 Arka tarap - Örän ýumşak */
        .bg-glow {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(94, 92, 230, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, rgba(52, 199, 89, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        .container { max-width: 500px; margin: 0 auto; }

        /* Header */
        .header {
            padding: 25px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { font-size: 30px; font-weight: 800; letter-spacing: -1px; }
        .header p { color: var(--text-secondary); font-size: 14px; font-weight: 500; }

        /* Sesi işjeňleşdiriji düwme */
        #sound-btn {
            background: var(--accent);
            color: white; border: none;
            width: 100%; padding: 18px;
            border-radius: 20px; margin-bottom: 25px;
            font-weight: 700; font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(94, 92, 230, 0.2);
            transition: 0.3s;
        }
        #sound-btn:active { transform: scale(0.97); }

        /* Randewu Karty - iOS 26 Ýumşaklygy */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .name { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        
        .phone {
            display: inline-block;
            color: var(--green); font-weight: 700; font-size: 19px;
            text-decoration: none; margin-bottom: 20px;
            background: rgba(52, 199, 89, 0.12);
            padding: 10px 18px; border-radius: 15px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .info-row { display: flex; align-items: flex-start; gap: 12px; font-size: 15px; }
        .info-row span:first-child { color: var(--text-secondary); min-width: 80px; font-weight: 500; }
        .info-row b { color: #fff; font-weight: 600; flex: 1; }

        .delete-btn {
            position: absolute; right: 20px; top: 25px;
            background: rgba(255, 59, 48, 0.15);
            border: none; border-radius: 12px;
            color: var(--red); padding: 10px 15px; font-weight: 700; cursor: pointer;
        }

        .time-footer {
            font-size: 11px; color: var(--text-secondary); margin-top: 15px; text-align: right;
        }

        .empty { text-align: center; margin-top: 100px; color: var(--text-secondary); font-size: 18px; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="container">
        <div class="header">
            <div>
                <h1>Randewular</h1>
                <p id="counter">Täze ýazgylar garaşýar</p>
            </div>
            <div style="background: rgba(52, 199, 89, 0.1); color: var(--green); padding: 5px 12px; border-radius: 12px; font-size: 11px; font-weight: 800;">● JANLY</div>
        </div>

        <!-- BU DÜWMÄ HÖKMAN BASYŇ -->
        <button id="sound-btn" onclick="startSystem()">
            🔔 Randewu sesini işjeňleşdir
        </button>

        <div id="list">
            <div class="empty">Maglumatlar ýüklenýär...</div>
        </div>
    </div>

    <!-- Hökman işleýän ses (Kodyň içine goýuldy) -->
    <audio id="notifSound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzFwxW8nB155ILbdxuj5DREx2s_ltHme4",
            authDomain: "makga-8a13a.firebaseapp.com",
            databaseURL: "https://makga-8a13a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "makga-8a13a",
            storageBucket: "makga-8a13a.firebasestorage.app",
            messagingSenderId: "875840350708",
            appId: "1:875840350708:web:eeea3cffd993d2a3d2f1a1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isSoundEnabled = false;
        let isInitialLoad = true;

        function startSystem() {
            const audio = document.getElementById("notifSound");
            audio.play().then(() => {
                audio.pause();
                isSoundEnabled = true;
                document.getElementById("sound-btn").style.display = "none";
            }).catch(e => console.log("Rugsat berilmedi."));
        }

        // Täze randewu düşende ses çalmak
        db.ref("randevular").on("child_added", (snap) => {
            if (!isInitialLoad && isSoundEnabled) {
                document.getElementById("notifSound").play();
            }
        });

        // Listäni we hyzmatlary görkezmek
        db.ref("randevular").on("value", (snap) => {
            const listDiv = document.getElementById("list");
            const data = snap.val();
            listDiv.innerHTML = "";
            
            if(!data) {
                listDiv.innerHTML = '<div class="empty">📭 Häzirlikçe täze ýazgy ýok.</div>';
                document.getElementById("counter").innerText = "Sany: 0";
                isInitialLoad = false;
                return;
            }

            const keys = Object.keys(data).reverse();
            document.getElementById("counter").innerText = "Jemi: " + keys.length + " sany randewu";

            keys.forEach(id => {
                const r = data[id];
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <button class="delete-btn" onclick="sil('${id}')">Poz</button>
                    <div class="name">${r.musteri}</div>
                    <a href="tel:${r.telefon}" class="phone">📞 ${r.telefon}</a>
                    
                    <div class="info-box">
                        <div class="info-row">
                            <span>📅 Wagty:</span>
                            <b>${r.tarih ? r.tarih.replace("T", " | ") : "Bellenilmedik"}</b>
                        </div>
                        <div class="info-row">
                            <span>🛠️ Hyzmat:</span>
                            <b>${r.hyzmatlar || "Saýlanmady"}</b>
                        </div>
                    </div>
                    
                    <div class="time-footer">Gelen wagty: ${new Date(r.vakit).toLocaleTimeString()}</div>
                `;
                listDiv.appendChild(card);
            });
            isInitialLoad = false;
        });

        function sil(id) {
            if(confirm("Bu randewuny pozmalymy?")) {
                db.ref("randevular/" + id).remove();
            }
        }
    </script>
</body>
</html>
