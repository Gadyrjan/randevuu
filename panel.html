<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX Kontrol Paneli</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #050505; color: white; padding: 20px; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); border-left: 5px solid #8b5cf6; position: relative; animation: slide 0.4s ease; }
        @keyframes slide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .musteri { font-size: 20px; font-weight: bold; color: #a5b4fc; margin-bottom: 5px; }
        .telefon-link { color: #4ade80; text-decoration: none; font-weight: bold; font-size: 16px; display: block; margin-bottom: 10px; }
        .info { color: #94a3b8; font-size: 14px; margin-bottom: 5px; }
        .btn-done { position: absolute; right: 20px; bottom: 20px; background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); padding: 8px 12px; border-radius: 10px; cursor: pointer; }
        .status { font-size: 12px; padding: 5px 12px; border-radius: 20px; background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 style="font-size: 24px;">Randevular</h1>
                <p style="font-size: 12px; color: #64748b;">Yeni kayıt geldiğinde ses çalar 🔔</p>
            </div>
            <div id="connection" class="status">Baglanyar...</div>
        </div>
        <div id="liste">Garaşylyar...</div>
    </div>

    <!-- Bildirim Sesi -->
    <audio id="dingSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzFwxW8nB155ILbdxuj5DREx2s_ltHme4",
            authDomain: "makga-8a13a.firebaseapp.com",
            databaseURL: "https://makga-8a13a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "makga-8a13a",
            storageBucket: "makga-8a13a.firebasestorage.app",
            messagingSenderId: "875840350708",
            appId: "1:875840350708:web:eeea3cffd993d2a3d2f1a1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isInitialLoad = true;

        // Yeni kayıt gelince ses çalma mantığı
        db.ref("randevular").on("child_added", (snapshot) => {
            if (!isInitialLoad) {
                document.getElementById("dingSound").play().catch(e => console.log("Ses çalma izni yok"));
            }
        });

        // Sayfayı ilk açtığımızda ses çalmasın diye bayrağı değiştir
        db.ref("randevular").once("value", () => {
            isInitialLoad = false;
        });

        // Listeyi Anlık Güncelle
        db.ref("randevular").on("value", (snap) => {
            const liste = document.getElementById("liste");
            const data = snap.val();
            liste.innerHTML = "";
            document.getElementById("connection").innerText = "CANLY BAĞLANYŞYK";

            if(!data) { liste.innerHTML = "<div style='text-align:center;color:#444;margin-top:50px;'>Täze randevu ýok</div>"; return; }

            Object.keys(data).reverse().forEach(id => {
                const r = data[id];
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <div class="musteri">${r.musteri}</div>
                    <a href="tel:${r.telefon}" class="telefon-link">📞 ${r.telefon || 'Belgi yok'}</a>
                    <div class="info">📅 <b>Wagt:</b> ${r.tarih.replace("T", " ")}</div>
                    <div class="info">🛠 <b>Hyzmat:</b> ${r.hyzmatlar}</div>
                    <button class="btn-done" onclick="sil('${id}')">Poz</button>
                `;
                liste.appendChild(card);
            });
        });

        function sil(id) { if(confirm("Pozulsynmy?")) db.ref("randevular/" + id).remove(); }
    </script>
</body>
</html>
