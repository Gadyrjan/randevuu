<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX - Dolandyryş Paneli</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --accent: #5e5ce6;
            --green: #30d158;
            --red: #ff453a;
            --text-main: #ffffff;
            --text-sec: #8e8e93;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

        body { 
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 500px; margin: 0 auto; }

        /* Header */
        .header {
            padding: 20px 5px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        .header p { color: var(--text-sec); font-size: 14px; }

        /* Ses düwmesi - Hökman basmaly */
        #sound-btn {
            background: var(--accent);
            color: white; border: none;
            width: 100%; padding: 16px;
            border-radius: 14px; margin-bottom: 20px;
            font-weight: 700; cursor: pointer;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(94, 92, 230, 0.3);
        }

        /* Randewu Karty - Has dury we okalýan */
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #38383a;
            position: relative;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .name { font-size: 22px; font-weight: 700; margin-bottom: 10px; color: #fff; }
        
        .phone {
            display: inline-flex; align-items: center;
            color: var(--green); font-weight: 700; font-size: 18px;
            text-decoration: none; margin-bottom: 15px;
            background: rgba(48, 209, 88, 0.15); 
            padding: 8px 15px; border-radius: 12px;
        }

        .info-row { margin-bottom: 8px; font-size: 15px; color: #d1d1d6; display: flex; align-items: center; gap: 10px; }
        .label { color: var(--text-sec); font-weight: 500; min-width: 70px; }

        .delete-btn {
            position: absolute; right: 15px; top: 15px;
            background: rgba(255, 69, 58, 0.2);
            border: none; border-radius: 10px;
            color: var(--red); padding: 8px 12px; font-weight: 700; cursor: pointer;
        }

        .time-stamp {
            font-size: 12px; color: var(--text-sec); margin-top: 15px; border-top: 1px solid #38383a; padding-top: 10px;
        }

        .empty { text-align: center; padding: 100px 20px; color: var(--text-sec); font-size: 18px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div>
                <h1>Randewular</h1>
                <p id="counter">Sany: 0</p>
            </div>
            <div id="online-tag" style="color: var(--green); font-weight: 700; font-size: 12px;">● ONLAÝN</div>
        </div>

        <!-- SESI AÇMAK ÜÇIN -->
        <button id="sound-btn" onclick="enableSound()">
            🔔 Sesli bildirişi işjeňleşdir
        </button>

        <div id="list">
            <div class="empty">Garaşylýar...</div>
        </div>
    </div>

    <!-- iPhone SMS Sesi (Tritone) -->
    <audio id="iosSound" src="https://raw.githubusercontent.com/Anis-M-H/notification-sounds/main/iphone_sms.mp3" preload="auto"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzFwxW8nB155ILbdxuj5DREx2s_ltHme4",
            authDomain: "makga-8a13a.firebaseapp.com",
            databaseURL: "https://makga-8a13a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "makga-8a13a",
            storageBucket: "makga-8a13a.firebasestorage.app",
            messagingSenderId: "875840350708",
            appId: "1:875840350708:web:eeea3cffd993d2a3d2f1a1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let canPlaySound = false;
        let isFirstLoad = true;

        function enableSound() {
            const audio = document.getElementById("iosSound");
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
                canPlaySound = true;
                document.getElementById("sound-btn").style.display = "none";
                alert("Ses işjeňleşdi! Täze randewu gelende iPhone sesi çalar.");
            }).catch(e => alert("Sesi açyp bolmady."));
        }

        // Täze randewu gelende
        db.ref("randevular").on("child_added", (snap) => {
            if (!isFirstLoad && canPlaySound) {
                const audio = document.getElementById("iosSound");
                audio.play().catch(e => console.log("Ses çalynmady."));
            }
        });

        // Listäni ekrana çykarmak
        db.ref("randevular").on("value", (snap) => {
            const listDiv = document.getElementById("list");
            const data = snap.val();
            listDiv.innerHTML = "";
            
            if(!data) {
                listDiv.innerHTML = '<div class="empty">Häzirlikçe randewu ýok.</div>';
                document.getElementById("counter").innerText = "Sany: 0";
                isFirstLoad = false;
                return;
            }

            const keys = Object.keys(data).reverse();
            document.getElementById("counter").innerText = "Sany: " + keys.length;

            keys.forEach(id => {
                const r = data[id];
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <button class="delete-btn" onclick="sil('${id}')">Poz</button>
                    <div class="name">${r.musteri}</div>
                    <a href="tel:${r.telefon}" class="phone">📞 ${r.telefon}</a>
                    <div class="info-row">
                        <span class="label">Wagty:</span>
                        <b>${r.tarih.replace("T", " | ")}</b>
                    </div>
                    <div class="info-row">
                        <span class="label">Hyzmat:</span>
                        <b>${r.hizmetler}</b>
                    </div>
                    <div class="time-stamp">Ugradylan wagty: ${new Date(r.vakit).toLocaleTimeString()}</div>
                `;
                listDiv.appendChild(card);
            });
            isFirstLoad = false;
        });

        function sil(id) {
            if(confirm("Bu randewu pozulsynmy?")) {
                db.ref("randevular/" + id).remove();
            }
        }
    </script>
</body>
</html>
